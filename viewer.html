<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nijo Castle — Ninomaru Palace Guide</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #111;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  #map-wrap {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #map-img {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }
  .badge {
    position: absolute;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(43, 108, 176, 0.55);
    border: 2px solid rgba(255,255,255,0.6);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translate(-50%, -50%);
    transition: all 0.35s ease;
    pointer-events: none;
  }
  .badge.active {
    width: 56px;
    height: 56px;
    background: #d4a017;
    border: 3px solid #fff;
    font-size: 22px;
    box-shadow: 0 0 0 6px rgba(212,160,23,0.35), 0 0 24px rgba(212,160,23,0.8);
    z-index: 5;
  }
  #info {
    flex: 0 0 auto;
    background: #181818;
    border-top: 1px solid #333;
    padding: 18px 22px 26px;
    min-height: 130px;
  }
  #info .num {
    display: inline-block;
    background: #d4a017;
    color: #111;
    font-weight: 700;
    font-size: 14px;
    border-radius: 20px;
    padding: 3px 12px;
    margin-bottom: 8px;
  }
  #info h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  #info .subtitle {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 10px;
  }
  #info p {
    font-size: 15px;
    line-height: 1.6;
    color: #eee;
  }
  #status {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 11px;
    color: #666;
    z-index: 10;
  }
  #waiting {
    text-align: center;
    padding: 40px 20px;
    color: #888;
  }
</style>
</head>
<body>
<div id="app">
  <div id="map-wrap">
    <div id="status">connecting…</div>
    <img id="map-img" src="nijo_official_map.png" alt="Nijo Castle Ninomaru Palace Map">
    <div id="badges"></div>
  </div>
  <div id="info">
    <div id="waiting">Waiting for the guide to begin the tour…</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="content.js"></script>
<script src="firebase-config.js"></script>
<script>
  console.log('Firebase config loaded:', firebaseConfig);
  firebase.initializeApp(firebaseConfig);
  console.log('Firebase app initialized');
  const db = firebase.database();
  console.log('Database instance:', db);
  const stateRef = db.ref(DB_PATH);
  console.log('State ref path:', DB_PATH);

  const mapImg = document.getElementById('map-img');
  const badgesLayer = document.getElementById('badges');
  const infoEl = document.getElementById('info');
  const statusEl = document.getElementById('status');

  let badgeEls = {};

  function buildBadges() {
    badgesLayer.innerHTML = '';
    badgeEls = {};
    const rect = mapImg.getBoundingClientRect();
    const wrapRect = document.getElementById('map-wrap').getBoundingClientRect();
    const offsetX = rect.left - wrapRect.left;
    const offsetY = rect.top - wrapRect.top;
    const scaleX = rect.width / MAP_NATIVE_WIDTH;
    const scaleY = rect.height / MAP_NATIVE_HEIGHT;

    TOUR_CONTENT.forEach(stop => {
      const b = document.createElement('div');
      b.className = 'badge';
      b.textContent = stop.n;
      b.style.left = (offsetX + stop.x * scaleX) + 'px';
      b.style.top = (offsetY + stop.y * scaleY) + 'px';
      badgesLayer.appendChild(b);
      badgeEls[stop.n] = b;
    });
  }

  function showStop(n) {
    const stop = TOUR_CONTENT.find(s => s.n === n);
    if (!stop) return;

    Object.entries(badgeEls).forEach(([num, el]) => {
      el.classList.toggle('active', Number(num) === n);
    });

    infoEl.innerHTML = `
      <div class="num">STOP ${stop.n} / ${TOUR_CONTENT.length}</div>
      <h1>${stop.title}</h1>
      <div class="subtitle">${stop.subtitle}</div>
      <p>${stop.text}</p>
    `;
  }

  if (mapImg.complete) {
    buildBadges();
  } else {
    mapImg.addEventListener('load', buildBadges);
  }
  window.addEventListener('resize', buildBadges);

  console.log('Attaching listener to', DB_PATH);
  stateRef.on('value', (snap) => {
    const data = snap.val();
    console.log('Received data:', data);
    statusEl.textContent = 'connected';
    if (data && data.current) {
      showStop(data.current);
    }
  }, (err) => {
    statusEl.textContent = 'connection error: ' + err.message;
    console.error('Firebase error:', err);
  });
</script>
</body>
</html>
